<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커뮤니티 — WordCraft AI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-wrap { padding-top: 80px; min-height: 100vh; background: var(--bg); }

    /* Hero bar */
    .community-hero { background: var(--bg-2); border-bottom: 1px solid var(--border); padding: 36px 0; }
    .community-hero h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .community-hero p { color: var(--text-2); font-size: 0.9rem; margin-bottom: 20px; }

    /* Search bar */
    .search-bar { display: flex; gap: 10px; flex-wrap: wrap; }
    .search-input-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; }
    .search-input {
      width: 100%; background: var(--bg-3); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px 10px 36px;
      color: var(--text); font-size: 0.9rem; outline: none; transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .sort-select {
      background: var(--bg-3); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      color: var(--text); font-size: 0.9rem; outline: none; cursor: pointer;
    }

    /* Tag filters */
    .tag-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .filter-chip {
      padding: 5px 14px; border: 1.5px solid var(--border-2); border-radius: 100px;
      font-size: 0.8rem; font-weight: 600; color: var(--text-2); cursor: pointer; transition: all .2s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent-2); }
    .filter-chip.active { border-color: var(--accent); color: var(--accent-2); background: var(--accent-dim); }

    /* Content area */
    .community-content { padding: 36px 0 80px; }
    .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
    .content-header h2 { font-size: 1rem; font-weight: 700; color: var(--text-2); }

    /* Vocab grid */
    .vocab-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
    @media (max-width: 960px) { .vocab-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 600px) { .vocab-grid { grid-template-columns: 1fr; } }

    .pub-card {
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color .25s, transform .25s;
    }
    .pub-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--shadow); }

    .pub-card__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .pub-card__tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .pub-card__likes { font-size: 0.82rem; color: #ff6b8a; white-space: nowrap; cursor: pointer; }
    .pub-card__likes:hover { color: #ff4466; }

    .pub-card__title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .pub-card__desc { font-size: 0.83rem; color: var(--text-2); line-height: 1.5; flex: 1; }
    .pub-card__meta { display: flex; gap: 12px; font-size: 0.76rem; color: var(--text-3); flex-wrap: wrap; }

    .pub-card__footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .pub-card__author { font-size: 0.78rem; color: var(--text-3); }

    /* Load more */
    .load-more { text-align: center; margin-top: 36px; }

    /* Empty */
    .empty-state { text-align: center; padding: 80px 24px; color: var(--text-3); grid-column: 1/-1; }
    .empty-state__icon { font-size: 3rem; margin-bottom: 16px; }

    /* Skeleton */
    .skeleton { background: var(--bg-4); border-radius: 6px; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0%,100% { opacity:.6; } 50% { opacity:1; } }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">🔤 WordCraft<span>AI</span></a>
      <ul class="nav__links">
        <li><a href="dashboard.html">대시보드</a></li>
        <li><a href="vocab-new.html">단어장 만들기</a></li>
        <li><a href="community.html" style="color:var(--text)">커뮤니티</a></li>
      </ul>
      <div class="nav__actions">
        <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">
          <span class="theme-toggle__icon theme-toggle__icon--dark">🌙</span>
          <span class="theme-toggle__icon theme-toggle__icon--light">☀️</span>
        </button>
        <a href="settings.html" class="btn btn--ghost">⚙️ 설정</a>
        <button class="btn btn--ghost" id="logoutBtn">로그아웃</button>
      </div>
      <button class="nav__hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="nav__mobile" id="mobileMenu">
      <a href="dashboard.html">대시보드</a>
      <a href="vocab-new.html">단어장 만들기</a>
      <a href="community.html">커뮤니티</a>
      <a href="settings.html">설정</a>
      <button class="btn btn--ghost" id="logoutBtnMobile">로그아웃</button>
    </div>
  </nav>

  <div class="page-wrap">
    <!-- Hero / Search -->
    <div class="community-hero">
      <div class="container">
        <h1>🌐 커뮤니티 단어장</h1>
        <p>다른 사람들이 만든 단어장을 탐색하고 복사해 바로 학습하세요.</p>
        <div class="search-bar">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="단어장 제목, 태그, 작성자 검색..." />
          </div>
          <select class="sort-select" id="sortSelect">
            <option value="likes">인기순</option>
            <option value="newest">최신순</option>
            <option value="words">단어 수</option>
          </select>
        </div>
        <div class="tag-filters" id="tagFilters">
          <div class="filter-chip active" data-tag="all">전체</div>
          <div class="filter-chip" data-tag="수능">수능</div>
          <div class="filter-chip" data-tag="TOEIC">토익</div>
          <div class="filter-chip" data-tag="TOEFL">토플</div>
          <div class="filter-chip" data-tag="TEPS">텝스</div>
          <div class="filter-chip" data-tag="IELTS">IELTS</div>
          <div class="filter-chip" data-tag="일상회화">일상회화</div>
          <div class="filter-chip" data-tag="비즈니스">비즈니스</div>
          <div class="filter-chip" data-tag="학술">학술</div>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="community-content">
      <div class="container">
        <div class="content-header">
          <h2 id="resultCount">단어장을 불러오는 중...</h2>
        </div>
        <div class="vocab-grid" id="vocabGrid">
          <!-- JS로 채워짐 -->
        </div>
        <div class="load-more" id="loadMore" style="display:none;">
          <button class="btn btn--ghost" id="loadMoreBtn">더 보기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script>
    (function () {
      const token = localStorage.getItem('accessToken');
      if (!token) { window.location.href = 'login.html'; return; }

      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      if (localStorage.getItem('wc-theme') === 'light') html.classList.add('light');
      toggle.addEventListener('click', () => {
        html.classList.toggle('light');
        localStorage.setItem('wc-theme', html.classList.contains('light') ? 'light' : 'dark');
      });

      function logout() { localStorage.removeItem('accessToken'); localStorage.removeItem('refreshToken'); window.location.href = 'login.html'; }
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('logoutBtnMobile').addEventListener('click', logout);

      /* State */
      let activeTag = 'all';
      let sortBy = 'likes';
      let searchQ = '';
      let page = 0;
      const PAGE_SIZE = 9;
      let allData = [];

      /* 서버에서 받은 전체 원본 데이터 (정규화 완료) */
      let rawData = [];

      /* API 응답 → 내부 포맷 변환 */
      function normalize(v) {
        const tags = v.tag ? v.tag.split(',').map(t => t.trim()).filter(Boolean) : [];
        const dateStr = v.createdAt ? v.createdAt.substring(0, 10) : '';
        return {
          id: v.id,
          title: v.title || '',
          description: v.description || '',
          tags,
          wordCount: v.wordCount || 0,
          likes: v.likes || 0,
          author: v.nickname || v.author || '',
          updatedAt: dateStr,
        };
      }

      /* 클라이언트 필터 + 정렬 */
      function applyFilter(data) {
        return data.filter(v => {
          const matchTag = activeTag === 'all' || v.tags.includes(activeTag);
          const q = searchQ.toLowerCase();
          const matchQ = !q || v.title.toLowerCase().includes(q) || v.author.toLowerCase().includes(q);
          return matchTag && matchQ;
        }).sort((a, b) => {
          if (sortBy === 'likes') return b.likes - a.likes;
          if (sortBy === 'words') return b.wordCount - a.wordCount;
          return b.id - a.id;
        });
      }

      async function loadVocabs() {
        showSkeleton();
        try {
          const res = await fetch('/api/community', {
            headers: { Authorization: 'Bearer ' + token }
          });
          if (res.status === 401) { logout(); return; }
          if (!res.ok) throw new Error('서버 오류');
          const data = await res.json();
          rawData = (Array.isArray(data) ? data : (data.content || [])).map(normalize);
        } catch {
          rawData = [];
        }
        renderFiltered();
      }

      function renderFiltered() {
        const filtered = applyFilter(rawData);
        const pageSlice = filtered.slice(0, (page + 1) * PAGE_SIZE);
        allData = pageSlice;
        renderGrid();
        const hasMore = filtered.length > (page + 1) * PAGE_SIZE;
        document.getElementById('loadMore').style.display = hasMore ? 'block' : 'none';
      }

      function showSkeleton() {
        const grid = document.getElementById('vocabGrid');
        document.getElementById('resultCount').textContent = '단어장을 불러오는 중...';
        grid.innerHTML = Array.from({length: 6}).map(() => `
          <div class="pub-card">
            <div class="skeleton" style="height:18px;width:60%;margin-bottom:10px;"></div>
            <div class="skeleton" style="height:14px;width:90%;margin-bottom:6px;"></div>
            <div class="skeleton" style="height:14px;width:75%;"></div>
          </div>`).join('');
      }

      function renderGrid() {
        const grid = document.getElementById('vocabGrid');
        document.getElementById('resultCount').textContent = `단어장 ${allData.length}개`;

        if (allData.length === 0) {
          grid.innerHTML = `<div class="empty-state">
            <div class="empty-state__icon">🔍</div>
            <h3 style="color:var(--text-2);margin-bottom:8px;">검색 결과가 없어요</h3>
            <p>다른 키워드나 태그로 검색해보세요.</p>
          </div>`;
          return;
        }

        grid.innerHTML = allData.map(v => pubCard(v)).join('');

        /* Card click → detail page */
        grid.querySelectorAll('.pub-card__clickable').forEach(area => {
          area.addEventListener('click', () => {
            window.location.href = `community-vocab.html?id=${area.dataset.id}`;
          });
        });

        /* Like buttons */
        grid.querySelectorAll('.like-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            toggleLike(btn);
          });
        });

        /* Copy buttons */
        grid.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            copyVocab(btn);
          });
        });

        /* Reveal */
        setTimeout(() => {
          grid.querySelectorAll('.reveal').forEach((el, i) => {
            el.style.transitionDelay = `${(i % 6) * 60}ms`;
            const obs = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }), { threshold: 0.05 });
            obs.observe(el);
          });
        }, 50);
      }

      function pubCard(v) {
        const tagHtml = (v.tags || []).map(t => `<span class="tag tag--${tagClass(t)}">${t}</span>`).join('');
        return `
          <div class="pub-card reveal">
            <div class="pub-card__clickable" data-id="${v.id}" style="cursor:pointer;">
              <div class="pub-card__top">
                <div class="pub-card__tags">${tagHtml}</div>
                <button class="pub-card__likes like-btn" data-id="${v.id}">♥ ${v.likes || 0}</button>
              </div>
              <div class="pub-card__title">${escHtml(v.title)}</div>
              <div class="pub-card__desc">${escHtml(v.description || '')}</div>
              <div class="pub-card__meta">
                <span>📚 ${v.wordCount || 0}단어</span>
                <span>${v.updatedAt || ''}</span>
              </div>
            </div>
            <div class="pub-card__footer">
              <span class="pub-card__author">by ${escHtml(v.author || '')}</span>
              <button class="btn btn--sm copy-btn" data-id="${v.id}">복사하기</button>
            </div>
          </div>`;
      }

      function toggleLike(btn) {
        const current = parseInt(btn.textContent.replace('♥ ', '')) || 0;
        const liked = btn.classList.contains('liked');
        btn.classList.toggle('liked');
        btn.textContent = `♥ ${liked ? current - 1 : current + 1}`;
        btn.style.color = liked ? '' : '#ff4466';
      }

      async function copyVocab(btn) {
        const vocabId = btn.dataset.id;
        btn.disabled = true; btn.textContent = '복사 중...';
        try {
          const res = await fetch(`/api/community/${vocabId}/copy`, {
            method: 'POST', headers: { Authorization: 'Bearer ' + token }
          });
          if (res.ok) {
            btn.textContent = '✅ 복사됨';
            btn.style.color = 'var(--success)';
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
          } else {
            btn.disabled = false; btn.textContent = '복사하기';
          }
        } catch {
          btn.disabled = false; btn.textContent = '복사하기';
        }
      }

      /* Tag filter */
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeTag = chip.dataset.tag;
          page = 0;
          renderFiltered();
        });
      });

      /* Sort */
      document.getElementById('sortSelect').addEventListener('change', e => {
        sortBy = e.target.value; page = 0; renderFiltered();
      });

      /* Search */
      let searchTimer;
      document.getElementById('searchInput').addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          searchQ = e.target.value.toLowerCase().trim();
          page = 0;
          renderFiltered();
        }, 300);
      });

      /* Load more */
      document.getElementById('loadMoreBtn').addEventListener('click', () => {
        page++;
        renderFiltered();
      });

      function tagClass(t) {
        if (t === 'TOEIC') return 'toeic'; if (t === 'TOEFL') return 'toefl';
        if (t === '수능') return 'csat'; return 'noun';
      }
      function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

      loadVocabs();
    })();
  </script>
</body>
</html>
