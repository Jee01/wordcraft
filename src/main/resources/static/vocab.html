<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단어장 — WordCraft AI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-wrap { padding-top: 80px; min-height: 100vh; background: var(--bg); }

    /* Vocab Header */
    .vocab-header { background: var(--bg-2); border-bottom: 1px solid var(--border); padding: 32px 0; }
    .vocab-header__inner { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
    .vocab-header__left { flex: 1; min-width: 260px; }
    .vocab-header__tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .vocab-header__title { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    .vocab-header__meta { display: flex; gap: 18px; font-size: 0.82rem; color: var(--text-3); flex-wrap: wrap; }
    .vocab-header__actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }

    /* Progress bar */
    .vocab-progress { margin-top: 16px; }
    .vocab-progress__label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-3); margin-bottom: 5px; }
    .progress-bar { height: 6px; background: var(--bg-4); border-radius: 100px; overflow: hidden; }
    .progress-bar__fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width .5s; }

    /* Words section */
    .words-section { padding: 40px 0; }
    .words-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
    .words-header h2 { font-size: 1.1rem; font-weight: 700; }
    .words-controls { display: flex; gap: 8px; align-items: center; }
    .search-input {
      background: var(--bg-3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 14px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      width: 200px;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Word cards grid */
    .word-cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    @media (max-width: 700px) { .word-cards-grid { grid-template-columns: 1fr; } }

    .wc {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: border-color .2s, transform .2s;
    }
    .wc:hover { border-color: var(--border-2); transform: translateY(-2px); }
    .wc__top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .wc__word { font-size: 1.3rem; font-weight: 800; color: var(--text); }
    .wc__ipa { font-size: 0.82rem; color: var(--text-3); margin-top: 2px; }
    .wc__actions { display: flex; gap: 6px; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 30px; height: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
      transition: border-color .2s, color .2s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.active { border-color: #ff6b8a; color: #ff6b8a; }

    .wc__meaning { font-size: 1rem; font-weight: 700; color: var(--accent-2); margin-bottom: 10px; }
    .wc__example {
      font-size: 0.85rem; color: var(--text-2); font-style: italic;
      padding: 8px 12px;
      background: var(--bg-4);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      margin-bottom: 10px;
    }
    .wc__example em { color: var(--accent-2); font-style: normal; font-weight: 600; }
    .wc__tip { font-size: 0.78rem; color: var(--text-3); }
    .wc__tags { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
    .wc__learned-badge {
      display: inline-block;
      font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
      border-radius: 100px;
      background: rgba(62,207,142,.12); color: var(--success); border: 1px solid var(--success);
    }

    /* Modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px;
      width: 100%; max-width: 480px; margin: 24px;
    }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Loading / empty */
    .loading { text-align: center; padding: 80px; color: var(--text-3); }
    .loading__dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }
    .loading__dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: genBounce 1.2s infinite; }
    .loading__dot:nth-child(2) { animation-delay: .15s; }
    .loading__dot:nth-child(3) { animation-delay: .3s; }
    @keyframes genBounce { 0%,80%,100% { transform:scale(.6);opacity:.4; } 40% { transform:scale(1);opacity:1; } }

    /* Edit mode */
    .edit-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; padding: 8px 0; }
    .edit-header__fields { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 14px; }
    .edit-header__actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; padding-top: 4px; }
    .edit-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-3); margin-bottom: 5px; }
    .edit-input {
      width: 100%; background: var(--bg-4); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 9px 13px;
      color: var(--text); font-size: 0.9rem; font-family: var(--font);
      outline: none; transition: border-color .2s;
    }
    .edit-input:focus { border-color: var(--accent); }
    .edit-vis-row { display: flex; gap: 18px; }
    .edit-vis-row label { display: flex; align-items: center; gap: 6px; font-size: 0.88rem; color: var(--text-2); cursor: pointer; }

    .edit-word-list { display: flex; flex-direction: column; gap: 14px; }
    .edit-word-entry {
      background: var(--bg-3); border: 1.5px solid var(--border-2);
      border-radius: var(--radius-lg); padding: 20px; transition: border-color .2s;
    }
    .edit-word-entry:focus-within { border-color: var(--accent); }
    .edit-word-entry__header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .edit-word-num {
      width: 26px; height: 26px; background: var(--accent-dim); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 800; color: var(--accent-2); flex-shrink: 0;
    }
    .edit-word-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 600px) { .edit-word-fields { grid-template-columns: 1fr; } }
    .edit-word-fields .full { grid-column: 1 / -1; }
    .edit-entry-input {
      width: 100%; background: var(--bg-4); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 9px 12px; color: var(--text);
      font-size: 0.88rem; font-family: var(--font); outline: none; transition: border-color .2s;
    }
    .edit-entry-input:focus { border-color: var(--accent); }
    .edit-entry-input::placeholder { color: var(--text-3); }
    .add-edit-word-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px; border: 1.5px dashed var(--border-2);
      border-radius: var(--radius-lg); background: none; cursor: pointer;
      color: var(--text-3); font-size: 0.88rem; font-family: var(--font);
      transition: border-color .2s, color .2s, background .2s; margin-top: 4px;
    }
    .add-edit-word-btn:hover { border-color: var(--accent); color: var(--accent-2); background: var(--accent-dim); }
    .edit-banner {
      display: none; border-radius: var(--radius); padding: 10px 14px;
      font-size: 0.85rem; margin-top: 12px;
    }
    .edit-banner.error   { background: rgba(255,80,80,.12); border: 1px solid rgba(255,80,80,.4); color: #ff8080; display: block; }
    .edit-banner.success { background: rgba(62,207,142,.12); border: 1px solid rgba(62,207,142,.4); color: var(--success); display: block; }

    .edit-tags-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .edit-tag-chip {
      padding: 6px 14px; border: 1.5px solid var(--border-2);
      border-radius: 100px; font-size: 0.82rem; font-weight: 600;
      color: var(--text-2); cursor: pointer; transition: all .2s; user-select: none;
    }
    .edit-tag-chip:hover { border-color: var(--accent); color: var(--accent-2); }
    .edit-tag-chip.selected { border-color: var(--accent); color: var(--accent-2); background: var(--accent-dim); }

    /* ── Multi-detail word card ── */
    .wc__details { display: flex; flex-direction: column; margin-bottom: 10px; }
    .wc__detail { padding: 10px 0; }
    .wc__detail + .wc__detail { border-top: 1px solid var(--border); }
    .wc__detail-pos {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      color: var(--accent-2); background: var(--accent-dim);
      border: 1px solid var(--accent); border-radius: 100px;
      padding: 2px 8px; margin-bottom: 6px;
    }
    .wc__detail-meaning { font-size: 1rem; font-weight: 700; color: var(--accent-2); margin-bottom: 6px; }
    .wc__detail-example {
      font-size: 0.85rem; color: var(--text-2); font-style: italic;
      padding: 6px 10px; background: var(--bg-4);
      border-radius: 8px; border-left: 3px solid var(--accent);
    }

    /* ── Edit: detail rows ── */
    .edit-detail-section-label { font-size: 0.8rem; font-weight: 700; color: var(--text-2); margin-top: 16px; margin-bottom: 8px; }
    .edit-detail-rows { display: flex; flex-direction: column; gap: 10px; }
    .edit-detail-row {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px;
    }
    .edit-detail-row__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .edit-detail-row__label { font-size: 0.73rem; font-weight: 700; color: var(--text-3); }
    .edit-detail-row__remove {
      background: none; border: none; cursor: pointer; color: var(--text-3);
      font-size: 0.78rem; padding: 2px 6px; border-radius: 6px; line-height: 1; font-family: var(--font);
    }
    .edit-detail-row__remove:hover { color: #e55; background: rgba(255,80,80,.1); }
    .edit-pos-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .edit-pos-chip {
      padding: 4px 10px; border: 1.5px solid var(--border-2);
      border-radius: 100px; font-size: 0.75rem; font-weight: 600;
      color: var(--text-2); cursor: pointer; transition: all .15s; user-select: none;
    }
    .edit-pos-chip:hover { border-color: var(--accent); color: var(--accent-2); }
    .edit-pos-chip.selected { border-color: var(--accent); color: var(--accent-2); background: var(--accent-dim); }
    .add-edit-detail-btn {
      display: flex; align-items: center; gap: 6px; width: 100%;
      background: none; border: 1px dashed var(--border-2); border-radius: var(--radius);
      padding: 7px 12px; cursor: pointer; color: var(--text-3);
      font-size: 0.8rem; font-family: var(--font); margin-top: 10px;
      transition: border-color .2s, color .2s;
    }
    .add-edit-detail-btn:hover { border-color: var(--accent); color: var(--accent-2); }

    /* PDF Modal */
    .pdf-section { margin-bottom: 20px; }
    .pdf-section-title {
      font-size: 0.78rem; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px;
    }
    .pdf-check-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.9rem; color: var(--text-2); margin-bottom: 8px; cursor: pointer;
    }
    .pdf-check-label input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .pdf-pos-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .pdf-radio-group { display: flex; flex-direction: column; gap: 8px; }
    .pdf-radio-label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-2); cursor: pointer; }
    .pdf-radio-label input { accent-color: var(--accent); cursor: pointer; }

    /* Print */
    #pdfPrintArea { display: none; }
    @media print {
      body > *:not(#pdfPrintArea) { display: none !important; }
      #pdfPrintArea { display: block !important; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">🔤 WordCraft<span>AI</span></a>
      <ul class="nav__links">

      <div class="nav__actions">

        <span></span><span></span><span></span>

      <a href="dashboard.html">대시보드</a>

    </div>
  </nav>

  <div class="page-wrap">
    <!-- Vocab Header (JS로 채워짐) -->
    <div class="vocab-header" id="vocabHeader">
      <div class="container">
        <div class="loading">
          <div class="loading__dots">
            <div class="loading__dot"></div><div class="loading__dot"></div><div class="loading__dot"></div>
          </div>
          <p>단어장을 불러오는 중...</p>
        </div>
      </div>
    </div>

    <!-- Words -->
    <div class="words-section">
      <div class="container">
        <div class="words-header">
          <h2 id="wordsTitle">단어 목록</h2>
          <div class="words-controls">
            <input type="text" class="search-input" id="searchInput" placeholder="단어 검색..." />
            <select class="search-input" id="filterSelect" style="width:auto;cursor:pointer;">
              <option value="all">전체</option>
              <option value="learned">학습 완료</option>
              <option value="unlearned">미학습</option>
            </select>
            <button class="btn btn--ghost btn--sm" id="shuffleBtn">🔀 순서 섞기</button>
            <button class="btn btn--ghost btn--sm" id="pdfBtn">📄 PDF 변환</button>
          </div>
        </div>
        <div class="word-cards-grid" id="wordCardsGrid">
          <div class="loading" style="grid-column:1/-1">
            <div class="loading__dots">
              <div class="loading__dot"></div><div class="loading__dot"></div><div class="loading__dot"></div>
            </div>
            <p>단어를 불러오는 중...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-backdrop" id="deleteModal">
    <div class="modal">
      <h3>🗑️ 단어장 삭제</h3>
      <p style="color:var(--text-2);font-size:0.9rem;">단어장을 삭제하면 모든 단어 데이터가 영구적으로 사라집니다. 정말 삭제하시겠습니까?</p>
      <div class="modal-actions">
        <button class="btn btn--ghost" id="deleteCancel">취소</button>
        <button class="btn btn--primary" style="background:#e55;border-color:#e55;" id="deleteConfirm">삭제하기</button>
      </div>
    </div>
  </div>

  <!-- PDF Modal -->
  <div class="modal-backdrop" id="pdfModal">
    <div class="modal" style="max-width:520px;">
      <h3>📄 PDF 출력 옵션</h3>
      <div class="pdf-section">
        <div class="pdf-section-title">출력 옵션</div>
        <label class="pdf-check-label" style="border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:4px;">
          <input type="checkbox" id="pdfHideAll"> <strong>전체 가리기</strong>
        </label>
        <label class="pdf-check-label"><input type="checkbox" id="pdfHideWord" class="pdf-hide-cb"> 단어 가리기 (빈칸으로 표시)</label>
        <label class="pdf-check-label"><input type="checkbox" id="pdfHideMeaning" class="pdf-hide-cb"> 뜻 가리기 (빈칸으로 표시)</label>
        <label class="pdf-check-label"><input type="checkbox" id="pdfHideIpa" class="pdf-hide-cb"> 발음기호 가리기</label>
        <label class="pdf-check-label"><input type="checkbox" id="pdfHideExample" class="pdf-hide-cb"> 예문 가리기</label>
        <label class="pdf-check-label"><input type="checkbox" id="pdfHideTip" class="pdf-hide-cb"> 기억 팁 가리기</label>
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">품사 필터 <span style="font-weight:400;text-transform:none;letter-spacing:0;">(미선택 시 전체 출력)</span></div>
        <div class="pdf-pos-grid" id="pdfPosFilter"></div>
      </div>
      <div class="pdf-section" style="margin-bottom:0;">
        <div class="pdf-section-title">학습 여부</div>
        <div class="pdf-radio-group">
          <label class="pdf-radio-label"><input type="radio" name="pdfLearn" value="all" checked> 전체</label>
          <label class="pdf-radio-label"><input type="radio" name="pdfLearn" value="learned"> 학습 완료만</label>
          <label class="pdf-radio-label"><input type="radio" name="pdfLearn" value="unlearned"> 미학습만</label>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn--ghost" id="pdfCancel">취소</button>
        <button class="btn btn--primary" id="pdfConfirm">🖨️ PDF 출력</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script>
    (async function () {
      const user = await requireAuth();
      if (!user) return;

      /* theme */
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      if (localStorage.getItem('wc-theme') === 'light') html.classList.add('light');
      toggle.addEventListener('click', () => {
        html.classList.toggle('light');
        localStorage.setItem('wc-theme', html.classList.contains('light') ? 'light' : 'dark');
      });

      /* logout */
      document.getElementById('logoutBtn').addEventListener('click', doLogout);
      document.getElementById('logoutBtnMobile').addEventListener('click', doLogout);

      /* Get vocab ID from query string */
      const params = new URLSearchParams(window.location.search);
      const vocabId = params.get('id');
      if (!vocabId) { window.location.href = 'dashboard.html'; return; }

      let vocabData = null;
      let wordsData = [];

      /* Load vocab */
      async function loadVocab() {
        try {
          const res = await authFetch(`/api/vocab/${vocabId}`);
          if (res.status === 401) { return; }
          if (res.status === 404) { window.location.href = 'dashboard.html'; return; }
          vocabData = await res.json();
          // Jackson이 primitive boolean isPublic()을 "public" 키로 직렬화하는 문제 정규화
          if (vocabData.isPublic === undefined && vocabData['public'] !== undefined) {
            vocabData.isPublic = vocabData['public'];
          }
          // VocaDetailResponseDTO 빌더에 tags가 없어 null로 오는 문제 정규화
          if (!Array.isArray(vocabData.tags)) vocabData.tags = [];
          wordsData = vocabData.words || [];
          vocabData.learnedCount = wordsData.filter(w => w.learned).length;
          vocabData.wordCount = vocabData.wordCount || wordsData.length;
          renderHeader(vocabData);
          renderWords(wordsData);
          attachReveal();
        } catch {
          /* fallback sample data */
          vocabData = {
            id: vocabId, title: '비즈니스 필수 동사 100', description: '실제 비즈니스 상황에서 자주 쓰이는 동사 중심',
            tags: ['TOEIC', '비즈니스'], isPublic: true, wordCount: 3,
            author: '나', updatedAt: '2026-06-06',
          };
          wordsData = [
            { id: 1, word: 'implement', ipa: '/ˈɪmplɪmənt/', memoryTip: '💡 impl(안에) + ment → 안으로 채워 넣다 → 실행하다', learned: true,
              vocaWordDetailDTOS: [{ id: 1, pos: '동사', meaning: '시행하다 · 실행하다', examples: 'The company will implement the new policy next quarter.' }] },
            { id: 2, word: 'significant', ipa: '/sɪɡˈnɪfɪkənt/', memoryTip: '💡 sign(신호) + ific → 신호를 보낼 만큼 중요한', learned: false,
              vocaWordDetailDTOS: [{ id: 2, pos: '형용사', meaning: '중요한 · 상당한', examples: 'There was a significant improvement in test scores.' }] },
            { id: 3, word: 'run', ipa: '/rʌn/', memoryTip: null, learned: false,
              vocaWordDetailDTOS: [
                { id: 3, pos: '동사', meaning: '달리다', examples: 'She runs every morning.' },
                { id: 4, pos: '명사', meaning: '달리기', examples: 'I went for a run in the park.' },
              ] },
          ];
          vocabData.learnedCount = wordsData.filter(w => w.learned).length;
          renderHeader(vocabData);
          renderWords(wordsData);
          attachReveal();
        }
      }

      function renderHeader(v) {
        const pct = v.wordCount ? Math.round((v.learnedCount || 0) / v.wordCount * 100) : 0;
        const tagHtml = (v.tags || []).map(t => `<span class="tag tag--${tagClass(t)}">${t}</span>`).join('');
        document.getElementById('vocabHeader').innerHTML = `
          <div class="container">
            <div class="vocab-header__inner">
              <div class="vocab-header__left">
                <div class="vocab-header__tags">${tagHtml}</div>
                <div class="vocab-header__title">${escHtml(v.title)}</div>
                <div class="vocab-header__meta">
                  <span>📚 ${v.wordCount || wordsData.length}단어</span>
                  <span>✅ ${v.learnedCount || 0}개 학습</span>
                  <span>${v.isPublic ? '🌐 공개' : '🔒 비공개'}</span>
                  <span>수정일 ${v.updatedAt || ''}</span>
                </div>
                <div class="vocab-progress">
                  <div class="vocab-progress__label"><span>학습 진도</span><span>${pct}%</span></div>
                  <div class="progress-bar"><div class="progress-bar__fill" style="width:${pct}%"></div></div>
                </div>
              </div>
              <div class="vocab-header__actions">
                <a href="test.html?vocabId=${v.id}" class="btn btn--primary">📝 테스트 시작</a>
                <button class="btn btn--ghost" id="editBtn">✏️ 수정</button>
                <button class="btn btn--ghost" id="deleteBtn" style="border-color:#e55;color:#e55;">🗑️ 삭제</button>
              </div>
            </div>
          </div>`;
        document.getElementById('wordsTitle').textContent = `단어 목록 (${wordsData.length}개)`;

        document.getElementById('deleteBtn').addEventListener('click', () => {
          document.getElementById('deleteModal').classList.add('open');
        });
        document.getElementById('editBtn').addEventListener('click', enterEditMode);
      }

      function renderWords(words) {
        const grid = document.getElementById('wordCardsGrid');
        if (words.length === 0) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-3);">단어가 없습니다.</div>';
          return;
        }
        grid.innerHTML = words.map(w => wordCard(w)).join('');
        grid.querySelectorAll('.bookmark-btn').forEach(btn => {
          btn.addEventListener('click', () => toggleLearned(btn));
        });
      }

      function wordCard(w) {
        const details = w.vocaWordDetailDTOS || [];
        const bodyHtml = details.length > 0
          ? `<div class="wc__details">
              ${details.map(d => `
                <div class="wc__detail">
                  ${d.pos ? `<span class="wc__detail-pos">${escHtml(d.pos)}</span>` : ''}
                  <div class="wc__detail-meaning">${escHtml(d.meaning || '')}</div>
                  ${d.examples ? `<div class="wc__detail-example">${escHtml(d.examples)}</div>` : ''}
                </div>`).join('')}
             </div>`
          : `<div class="wc__meaning">${escHtml(w.meaning || '')}</div>
             ${w.examples ? `<div class="wc__example">"${escHtml(w.examples)}"</div>` : ''}`;

        return `
          <div class="wc reveal">
            <div class="wc__top">
              <div>
                <div class="wc__word">${escHtml(w.word)}</div>
                <div class="wc__ipa">${escHtml(w.ipa || '')}</div>
              </div>
              <div class="wc__actions">
                <button class="icon-btn bookmark-btn ${w.learned ? 'active' : ''}" data-id="${w.id}" title="${w.learned ? '학습 취소' : '학습 완료 표시'}">
                  ${w.learned ? '⭐' : '☆'}
                </button>
              </div>
            </div>
            ${bodyHtml}
            ${w.memoryTip ? `<div class="wc__tip">${escHtml(w.memoryTip)}</div>` : ''}
            <div class="wc__tags">
              ${w.learned ? '<span class="wc__learned-badge">✅ 학습 완료</span>' : ''}
            </div>
          </div>`;
      }

      async function toggleLearned(btn) {
        const wordId = btn.dataset.id;
        const isLearned = btn.classList.contains('active');
        try {
          await authFetch(`/api/vocab/${vocabId}/wordLearn`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: Number(wordId), learned: !isLearned }),
          });
        } catch { /* optimistic UI */ }
        const word = wordsData.find(w => String(w.id) === String(wordId));
        if (word) word.learned = !isLearned;
        vocabData.learnedCount = wordsData.filter(w => w.learned).length;
        renderHeader(vocabData);
        renderWords(filterWords());
        attachReveal();
      }

      /* ── Edit mode ── */
      let editWords = [];
      let editSelectedTags = new Set();
      let editDetailId = 0;
      const EDIT_POS_OPTIONS = ['명사', '동사', '형용사', '부사', '전치사', '접속사', '구동사', '숙어', '기타'];

      function enterEditMode() {
        editWords = wordsData.map(w => ({
          ...w,
          details: (w.vocaWordDetailDTOS || []).map(d => ({ ...d })),
        }));
        editSelectedTags = new Set(vocabData.tags || []);
        renderEditHeader();
        renderEditWords();
      }

      function exitEditMode() {
        document.getElementById('wordCardsGrid').style.display = '';
        document.querySelector('.words-controls').style.display = '';
        renderHeader(vocabData);
        renderWords(wordsData);
        attachReveal();
      }

      const TAG_LIST = [
        { tag: '수능',    label: '수능' },
        { tag: 'TOEIC',   label: '토익 (TOEIC)' },
        { tag: 'TOEFL',   label: '토플 (TOEFL)' },
        { tag: 'TEPS',    label: '텝스 (TEPS)' },
        { tag: 'IELTS',   label: 'IELTS' },
        { tag: '일상회화', label: '일상회화' },
        { tag: '비즈니스', label: '비즈니스' },
        { tag: '학술',    label: '학술' },
      ];

      function renderEditHeader() {
        const chipsHtml = TAG_LIST.map(({ tag, label }) =>
          `<span class="edit-tag-chip${editSelectedTags.has(tag) ? ' selected' : ''}" data-tag="${tag}">${label}</span>`
        ).join('');

        document.getElementById('vocabHeader').innerHTML = `
          <div class="container">
            <div class="edit-header">
              <div class="edit-header__fields">
                <div>
                  <label class="edit-label">단어장 제목 *</label>
                  <input class="edit-input" id="editTitle" value="${escHtml(vocabData.title || '')}" maxlength="60" />
                </div>
                <div>
                  <label class="edit-label">학습 태그</label>
                  <div class="edit-tags-selector" id="editTagsSelector">${chipsHtml}</div>
                </div>
                <div>
                  <label class="edit-label">공개 여부</label>
                  <div class="edit-vis-row">
                    <label><input type="radio" name="editVis" value="false" ${!vocabData.isPublic ? 'checked' : ''} /> 🔒 비공개</label>
                    <label><input type="radio" name="editVis" value="true"  ${vocabData.isPublic  ? 'checked' : ''} /> 🌐 공개</label>
                  </div>
                </div>
                <div id="editBanner" class="edit-banner"></div>
              </div>
              <div class="edit-header__actions">
                <button class="btn btn--primary" id="saveEditBtn">💾 저장</button>
                <button class="btn btn--ghost"   id="cancelEditBtn">✕ 취소</button>
              </div>
            </div>
          </div>`;

        document.querySelectorAll('.edit-tag-chip').forEach(chip => {
          chip.addEventListener('click', () => {
            const tag = chip.dataset.tag;
            if (editSelectedTags.has(tag)) {
              editSelectedTags.delete(tag);
              chip.classList.remove('selected');
            } else {
              editSelectedTags.add(tag);
              chip.classList.add('selected');
            }
          });
        });
        document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
        document.getElementById('cancelEditBtn').addEventListener('click', exitEditMode);
      }

      function renderEditWords() {
        document.getElementById('wordsTitle').textContent = `단어 수정 (${editWords.length}개)`;
        document.querySelector('.words-controls').style.display = 'none';
        const grid = document.getElementById('wordCardsGrid');
        grid.style.display = 'block';

        const list = document.createElement('div');
        list.className = 'edit-word-list';
        list.id = 'editWordList';

        editWords.forEach((w, idx) => list.appendChild(buildEditEntry(w, idx)));

        const addBtn = document.createElement('button');
        addBtn.className = 'add-edit-word-btn';
        addBtn.type = 'button';
        addBtn.textContent = '+ 단어 추가';
        addBtn.addEventListener('click', () => {
          editWords.push({ word: '', meaning: '', pos: '', ipa: '', examples: '', memoryTip: '' });
          refreshEditWordList();
        });

        const saveBottomBtn = document.createElement('button');
        saveBottomBtn.className = 'btn btn--primary';
        saveBottomBtn.type = 'button';
        saveBottomBtn.textContent = '💾 저장';
        saveBottomBtn.style.cssText = 'width:100%;margin-top:8px;';
        saveBottomBtn.addEventListener('click', saveEdit);

        grid.innerHTML = '';
        grid.appendChild(list);
        grid.appendChild(addBtn);
        grid.appendChild(saveBottomBtn);
      }

      function renderEditDetailRow(wordObj, detail) {
        const row = document.createElement('div');
        row.className = 'edit-detail-row';
        row.innerHTML = `
          <div class="edit-detail-row__header">
            <span class="edit-detail-row__label">품사 선택</span>
            <button class="edit-detail-row__remove" type="button">✕ 삭제</button>
          </div>
          <div class="edit-pos-chips">
            ${EDIT_POS_OPTIONS.map(p => `<div class="edit-pos-chip${detail.pos === p ? ' selected' : ''}" data-pos="${p}">${p}</div>`).join('')}
          </div>
          <label class="edit-label">뜻 *</label>
          <input class="edit-entry-input" placeholder="예: 시행하다, 구현하다" value="${escHtml(detail.meaning || '')}" maxlength="120" style="margin-bottom:8px;" />
          <label class="edit-label">예문 (선택)</label>
          <textarea class="edit-entry-input" rows="2" placeholder="예: We need to implement this plan." maxlength="300">${escHtml(detail.examples || '')}</textarea>`;

        row.querySelectorAll('.edit-pos-chip').forEach(chip => {
          chip.addEventListener('click', () => {
            row.querySelectorAll('.edit-pos-chip').forEach(c => c.classList.remove('selected'));
            chip.classList.add('selected');
            detail.pos = chip.dataset.pos;
          });
        });
        row.querySelector('input').addEventListener('input', e => { detail.meaning = e.target.value; });
        row.querySelector('textarea').addEventListener('input', e => { detail.examples = e.target.value; });
        row.querySelector('.edit-detail-row__remove').addEventListener('click', () => {
          if (wordObj.details.length <= 1) return;
          wordObj.details = wordObj.details.filter(d => d !== detail);
          row.remove();
        });
        return row;
      }

      function buildEditEntry(w, idx) {
        const el = document.createElement('div');
        el.className = 'edit-word-entry';
        el.dataset.idx = idx;
        el.innerHTML = `
          <div class="edit-word-entry__header">
            <span class="edit-word-num">${idx + 1}</span>
            <button class="icon-btn" style="border-color:transparent;color:var(--text-3);" data-action="del" title="삭제">✕</button>
          </div>
          <div class="edit-word-fields">
            <div>
              <label class="edit-label">단어 *</label>
              <input class="edit-entry-input" data-field="word" value="${escHtml(w.word || '')}" placeholder="예: implement" />
            </div>
            <div>
              <label class="edit-label">발음기호</label>
              <input class="edit-entry-input" data-field="ipa" value="${escHtml(w.ipa || '')}" placeholder="예: /ˈɪmplɪmənt/" />
            </div>
            <div class="full">
              <label class="edit-label">기억 팁</label>
              <textarea class="edit-entry-input" data-field="memoryTip" rows="2" placeholder="예: impl(안에 넣다) → 실행하다">${escHtml(w.memoryTip || '')}</textarea>
            </div>
          </div>
          <div class="edit-detail-section-label">뜻 · 품사 · 예문</div>
          <div class="edit-detail-rows" id="edit-detail-rows-${idx}"></div>
          <button class="add-edit-detail-btn" type="button">+ 뜻 / 예문 추가</button>`;

        el.querySelector('[data-field="word"]').addEventListener('input', e => { w.word = e.target.value; });
        el.querySelector('[data-field="ipa"]').addEventListener('input', e => { w.ipa = e.target.value; });
        el.querySelector('[data-field="memoryTip"]').addEventListener('input', e => { w.memoryTip = e.target.value; });

        const detailRows = el.querySelector(`#edit-detail-rows-${idx}`);
        if (!w.details || w.details.length === 0) w.details = [{ id: ++editDetailId, pos: '', meaning: '', examples: '' }];
        w.details.forEach(d => detailRows.appendChild(renderEditDetailRow(w, d)));

        el.querySelector('.add-edit-detail-btn').addEventListener('click', () => {
          const d = { id: ++editDetailId, pos: '', meaning: '', examples: '' };
          w.details.push(d);
          detailRows.appendChild(renderEditDetailRow(w, d));
        });

        el.querySelector('[data-action="del"]').addEventListener('click', () => {
          if (editWords.length <= 1) { showEditBanner('error', '최소 1개의 단어가 필요합니다.'); return; }
          editWords.splice(idx, 1);
          refreshEditWordList();
        });
        return el;
      }

      function refreshEditWordList() {
        const list = document.getElementById('editWordList');
        if (!list) return;
        list.innerHTML = '';
        editWords.forEach((w, idx) => list.appendChild(buildEditEntry(w, idx)));
        document.getElementById('wordsTitle').textContent = `단어 수정 (${editWords.length}개)`;
      }

      async function saveEdit() {
        const title = document.getElementById('editTitle').value.trim();
        const tag   = [...editSelectedTags].join(',');
        const isPublic = document.querySelector('input[name="editVis"]:checked').value === 'true';

        if (!title) { showEditBanner('error', '단어장 제목을 입력해주세요.'); return; }
        if (!tag)   { showEditBanner('error', '태그를 하나 이상 선택해주세요.'); return; }
        const validWords = editWords.filter(w => w.word.trim());
        if (validWords.length === 0) { showEditBanner('error', '단어를 하나 이상 입력해주세요.'); return; }

        const payload = {
          title,
          tag,
          isPublic,
          updateAt: new Date().toISOString().slice(0, 19),
          words: validWords.map(w => ({
            word:      w.word.trim(),
            ipa:       w.ipa       || null,
            memoryTip: w.memoryTip || null,
            learned:   w.learned ?? false,
            vocaWordDetailDTOS: (w.details || [])
              .filter(d => (d.meaning || '').trim())
              .map(d => ({
                pos:      d.pos      || null,
                meaning:  (d.meaning || '').trim(),
                examples: d.examples || null,
              })),
          }))
        };

        const saveBtn = document.getElementById('saveEditBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = '저장 중...';

        try {
          const res = await authFetch(`/api/vocab/${vocabId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.status === 401) { return; }
          if (!res.ok) { showEditBanner('error', '저장에 실패했습니다. 다시 시도해주세요.'); return; }

          vocabData.title    = title;
          vocabData.tags     = [...editSelectedTags];
          vocabData.isPublic = isPublic;
          wordsData = validWords.map(w => ({ ...w, vocaWordDetailDTOS: w.details || [] }));

          exitEditMode();
        } catch {
          showEditBanner('error', '서버와 통신할 수 없습니다.');
        } finally {
          if (document.getElementById('saveEditBtn')) {
            saveBtn.disabled = false;
            saveBtn.textContent = '💾 저장';
          }
        }
      }

      function showEditBanner(type, msg) {
        const el = document.getElementById('editBanner');
        if (!el) return;
        el.className = `edit-banner ${type}`;
        el.textContent = msg;
      }

      /* Delete */
      document.getElementById('deleteCancel').addEventListener('click', () => {
        document.getElementById('deleteModal').classList.remove('open');
      });
      document.getElementById('deleteConfirm').addEventListener('click', async () => {
        try {
          await authFetch(`/api/vocab/${vocabId}`, { method: 'DELETE' });
        } catch { /* ignore */ }
        window.location.href = 'dashboard.html';
      });

      /* Search / filter */
      function filterWords() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const f = document.getElementById('filterSelect').value;
        return wordsData.filter(w => {
          const details = w.vocaWordDetailDTOS || [];
          const matchQ = !q || w.word.toLowerCase().includes(q) ||
            details.some(d => (d.meaning || '').toLowerCase().includes(q));
          const matchF = f === 'all' || (f === 'learned' && w.learned) || (f === 'unlearned' && !w.learned);
          return matchQ && matchF;
        });
      }

      document.getElementById('searchInput').addEventListener('input', () => { renderWords(filterWords()); attachReveal(); });
      document.getElementById('filterSelect').addEventListener('change', () => { renderWords(filterWords()); attachReveal(); });

      function attachReveal() {
        setTimeout(() => {
          const els = document.querySelectorAll('.reveal:not(.visible)');
          els.forEach((el, i) => { el.style.transitionDelay = `${(i % 6) * 50}ms`; });
          const obs = new IntersectionObserver(
            entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
            { threshold: 0.05 }
          );
          els.forEach(el => obs.observe(el));
        }, 50);
      }

      function tagClass(t) {
        if (t === 'TOEIC') return 'toeic'; if (t === 'TOEFL') return 'toefl';
        if (t === '수능') return 'csat'; return 'noun';
      }
      function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      /* ── 순서 섞기 ── */
      document.getElementById('shuffleBtn').addEventListener('click', () => {
        for (let i = wordsData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [wordsData[i], wordsData[j]] = [wordsData[j], wordsData[i]];
        }
        renderWords(filterWords());
        attachReveal();
      });

      /* ── PDF 변환 ── */
      document.getElementById('pdfBtn').addEventListener('click', openPdfModal);
      document.getElementById('pdfCancel').addEventListener('click', () => {
        document.getElementById('pdfModal').classList.remove('open');
      });
      document.getElementById('pdfConfirm').addEventListener('click', executePrint);

      /* 전체 가리기 연동 */
      document.getElementById('pdfHideAll').addEventListener('change', function () {
        document.querySelectorAll('.pdf-hide-cb').forEach(cb => { cb.checked = this.checked; });
      });
      document.getElementById('pdfModal').addEventListener('change', function (e) {
        if (e.target.classList.contains('pdf-hide-cb')) {
          const cbs = [...document.querySelectorAll('.pdf-hide-cb')];
          document.getElementById('pdfHideAll').checked = cbs.every(cb => cb.checked);
        }
      });

      function openPdfModal() {
        const posSet = new Set();
        wordsData.forEach(w => (w.vocaWordDetailDTOS || []).forEach(d => { if (d.pos) posSet.add(d.pos); }));
        const container = document.getElementById('pdfPosFilter');
        if (posSet.size === 0) {
          container.innerHTML = '<span style="color:var(--text-3);font-size:0.85rem;">품사 정보 없음 — 전체 출력됩니다</span>';
        } else {
          container.innerHTML = [...posSet].map(p =>
            `<label class="pdf-check-label" style="margin-bottom:0;">
               <input type="checkbox" class="pdf-pos-cb" value="${escHtml(p)}" checked> ${escHtml(p)}
             </label>`
          ).join('');
        }
        document.getElementById('pdfModal').classList.add('open');
      }

      function executePrint() {
        document.getElementById('pdfModal').classList.remove('open');

        const hideWord    = document.getElementById('pdfHideWord').checked;
        const hideIpa     = document.getElementById('pdfHideIpa').checked;
        const hideMeaning = document.getElementById('pdfHideMeaning').checked;
        const hideExample = document.getElementById('pdfHideExample').checked;
        const hideTip     = document.getElementById('pdfHideTip').checked;
        const learnFilter = document.querySelector('input[name="pdfLearn"]:checked').value;
        const allPosCbs   = [...document.querySelectorAll('.pdf-pos-cb')];
        const selectedPos = new Set(allPosCbs.filter(cb => cb.checked).map(cb => cb.value));
        const posFilterActive = allPosCbs.length > 0;

        const printWords = wordsData.filter(w => {
          if (learnFilter === 'learned'   && !w.learned) return false;
          if (learnFilter === 'unlearned' &&  w.learned) return false;
          if (posFilterActive && selectedPos.size > 0) {
            const details = w.vocaWordDetailDTOS || [];
            if (!details.some(d => selectedPos.has(d.pos))) return false;
          }
          return true;
        });

        if (printWords.length === 0) {
          alert('출력할 단어가 없습니다. 필터 조건을 확인해주세요.');
          return;
        }

        const blank = (w) =>
          `<span style="display:inline-block;min-width:${w}px;border-bottom:2px solid #666;">&nbsp;</span>`;

        const cardsHtml = printWords.map(w => {
          const details = (w.vocaWordDetailDTOS || []).filter(d =>
            !posFilterActive || selectedPos.size === 0 || selectedPos.has(d.pos)
          );

          const wordHtml = hideWord
            ? blank(90)
            : `<strong style="font-size:1.1rem;color:#111;">${escHtml(w.word)}</strong>`;

          const ipaHtml = (!hideIpa && w.ipa)
            ? `<div style="font-size:0.76rem;color:#888;margin-top:2px;">${escHtml(w.ipa)}</div>`
            : '';

          const learnedBadge = w.learned
            ? `<span style="font-size:0.62rem;color:#2ca86e;border:1px solid #2ca86e;border-radius:20px;padding:1px 7px;margin-left:6px;">✅ 학습 완료</span>`
            : '';

          const detailsHtml = details.map((d, i) => {
            const meaningHtml = hideMeaning ? blank(130) :
              `<span style="font-size:0.9rem;font-weight:700;color:#333;">${escHtml(d.meaning || '')}</span>`;
            return `
              <div style="${i > 0 ? 'border-top:1px solid #eee;' : ''}padding:5px 0;">
                ${d.pos ? `<span style="font-size:0.66rem;font-weight:700;color:#5a52e8;background:rgba(90,82,232,.08);border:1px solid #5a52e8;border-radius:20px;padding:1px 7px;margin-bottom:4px;display:inline-block;">${escHtml(d.pos)}</span>` : ''}
                <div style="margin-top:3px;">${meaningHtml}</div>
                ${(!hideExample && d.examples) ? `<div style="font-size:0.76rem;color:#666;font-style:italic;margin-top:3px;padding-left:8px;border-left:3px solid #5a52e8;">${escHtml(d.examples)}</div>` : ''}
              </div>`;
          }).join('');

          const tipHtml = (!hideTip && w.memoryTip)
            ? `<div style="font-size:0.7rem;color:#aaa;margin-top:6px;padding-top:6px;border-top:1px dashed #ddd;">${escHtml(w.memoryTip)}</div>`
            : '';

          return `
            <div style="border:1px solid #ddd;border-radius:10px;padding:14px 16px;break-inside:avoid;page-break-inside:avoid;background:white;box-sizing:border-box;">
              <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:4px;margin-bottom:4px;">
                ${wordHtml}${learnedBadge}
              </div>
              ${ipaHtml}
              <div style="margin-top:6px;">${detailsHtml}</div>
              ${tipHtml}
            </div>`;
        }).join('');

        const optLabels = [
          hideWord    ? '단어 가림'   : '',
          hideIpa     ? '발음기호 가림' : '',
          hideMeaning ? '뜻 가림'     : '',
          hideExample ? '예문 가림'   : '',
          hideTip     ? '팁 가림'     : '',
          learnFilter === 'learned'   ? '학습 완료만' : '',
          learnFilter === 'unlearned' ? '미학습만'   : '',
        ].filter(Boolean).join(' · ');

        const printArea = document.createElement('div');
        printArea.id = 'pdfPrintArea';
        printArea.innerHTML = `
          <div style="font-family:sans-serif;max-width:900px;margin:0 auto;padding:20px;">
            <div style="margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid #222;">
              <h1 style="font-size:1.4rem;font-weight:800;margin:0 0 4px;color:#111;">${escHtml(vocabData.title || '단어장')}</h1>
              <div style="font-size:0.8rem;color:#666;">총 ${printWords.length}개 단어${optLabels ? ' · ' + optLabels : ''}</div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">${cardsHtml}</div>
          </div>`;

        document.body.appendChild(printArea);
        window.addEventListener('afterprint', () => {
          const el = document.getElementById('pdfPrintArea');
          if (el) el.remove();
        }, { once: true });
        window.print();
      }

      loadVocab();
    })();
  </script>
</body>
</html>
