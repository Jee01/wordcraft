<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단어장 — WordCraft AI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-wrap { padding-top: 80px; min-height: 100vh; background: var(--bg); }

    /* Vocab Header */
    .vocab-header { background: var(--bg-2); border-bottom: 1px solid var(--border); padding: 32px 0; }
    .vocab-header__inner { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
    .vocab-header__left { flex: 1; min-width: 260px; }
    .vocab-header__tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .vocab-header__title { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    .vocab-header__meta { display: flex; gap: 18px; font-size: 0.82rem; color: var(--text-3); flex-wrap: wrap; }
    .vocab-header__actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }

    /* Progress bar */
    .vocab-progress { margin-top: 16px; }
    .vocab-progress__label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-3); margin-bottom: 5px; }
    .progress-bar { height: 6px; background: var(--bg-4); border-radius: 100px; overflow: hidden; }
    .progress-bar__fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width .5s; }

    /* Words section */
    .words-section { padding: 40px 0; }
    .words-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
    .words-header h2 { font-size: 1.1rem; font-weight: 700; }
    .words-controls { display: flex; gap: 8px; align-items: center; }
    .search-input {
      background: var(--bg-3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 14px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      width: 200px;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Word cards grid */
    .word-cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    @media (max-width: 700px) { .word-cards-grid { grid-template-columns: 1fr; } }

    .wc {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: border-color .2s, transform .2s;
    }
    .wc:hover { border-color: var(--border-2); transform: translateY(-2px); }
    .wc__top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .wc__word { font-size: 1.3rem; font-weight: 800; color: var(--text); }
    .wc__ipa { font-size: 0.82rem; color: var(--text-3); margin-top: 2px; }
    .wc__actions { display: flex; gap: 6px; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 30px; height: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
      transition: border-color .2s, color .2s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.active { border-color: #ff6b8a; color: #ff6b8a; }

    .wc__meaning { font-size: 1rem; font-weight: 700; color: var(--accent-2); margin-bottom: 10px; }
    .wc__example {
      font-size: 0.85rem; color: var(--text-2); font-style: italic;
      padding: 8px 12px;
      background: var(--bg-4);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      margin-bottom: 10px;
    }
    .wc__example em { color: var(--accent-2); font-style: normal; font-weight: 600; }
    .wc__tip { font-size: 0.78rem; color: var(--text-3); }
    .wc__tags { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
    .wc__learned-badge {
      display: inline-block;
      font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
      border-radius: 100px;
      background: rgba(62,207,142,.12); color: var(--success); border: 1px solid var(--success);
    }

    /* Modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px;
      width: 100%; max-width: 480px; margin: 24px;
    }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Loading / empty */
    .loading { text-align: center; padding: 80px; color: var(--text-3); }
    .loading__dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }
    .loading__dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: genBounce 1.2s infinite; }
    .loading__dot:nth-child(2) { animation-delay: .15s; }
    .loading__dot:nth-child(3) { animation-delay: .3s; }
    @keyframes genBounce { 0%,80%,100% { transform:scale(.6);opacity:.4; } 40% { transform:scale(1);opacity:1; } }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">🔤 WordCraft<span>AI</span></a>
      <ul class="nav__links">
        <li><a href="dashboard.html">대시보드</a></li>
        <li><a href="vocab-new.html">단어장 만들기</a></li>
        <li><a href="community.html">커뮤니티</a></li>
      </ul>
      <div class="nav__actions">
        <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">
          <span class="theme-toggle__icon theme-toggle__icon--dark">🌙</span>
          <span class="theme-toggle__icon theme-toggle__icon--light">☀️</span>
        </button>
        <a href="settings.html" class="btn btn--ghost">⚙️ 설정</a>
        <button class="btn btn--ghost" id="logoutBtn">로그아웃</button>
      </div>
      <button class="nav__hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="nav__mobile" id="mobileMenu">
      <a href="dashboard.html">대시보드</a>
      <a href="vocab-new.html">단어장 만들기</a>
      <a href="community.html">커뮤니티</a>
      <a href="settings.html">설정</a>
      <button class="btn btn--ghost" id="logoutBtnMobile">로그아웃</button>
    </div>
  </nav>

  <div class="page-wrap">
    <!-- Vocab Header (JS로 채워짐) -->
    <div class="vocab-header" id="vocabHeader">
      <div class="container">
        <div class="loading">
          <div class="loading__dots">
            <div class="loading__dot"></div><div class="loading__dot"></div><div class="loading__dot"></div>
          </div>
          <p>단어장을 불러오는 중...</p>
        </div>
      </div>
    </div>

    <!-- Words -->
    <div class="words-section">
      <div class="container">
        <div class="words-header">
          <h2 id="wordsTitle">단어 목록</h2>
          <div class="words-controls">
            <input type="text" class="search-input" id="searchInput" placeholder="단어 검색..." />
            <select class="search-input" id="filterSelect" style="width:auto;cursor:pointer;">
              <option value="all">전체</option>
              <option value="learned">학습 완료</option>
              <option value="unlearned">미학습</option>
            </select>
          </div>
        </div>
        <div class="word-cards-grid" id="wordCardsGrid">
          <div class="loading" style="grid-column:1/-1">
            <div class="loading__dots">
              <div class="loading__dot"></div><div class="loading__dot"></div><div class="loading__dot"></div>
            </div>
            <p>단어를 불러오는 중...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-backdrop" id="deleteModal">
    <div class="modal">
      <h3>🗑️ 단어장 삭제</h3>
      <p style="color:var(--text-2);font-size:0.9rem;">단어장을 삭제하면 모든 단어 데이터가 영구적으로 사라집니다. 정말 삭제하시겠습니까?</p>
      <div class="modal-actions">
        <button class="btn btn--ghost" id="deleteCancel">취소</button>
        <button class="btn btn--primary" style="background:#e55;border-color:#e55;" id="deleteConfirm">삭제하기</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script>
    (function () {
      const token = localStorage.getItem('accessToken');
      if (!token) { window.location.href = 'login.html'; return; }

      /* theme */
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      if (localStorage.getItem('wc-theme') === 'light') html.classList.add('light');
      toggle.addEventListener('click', () => {
        html.classList.toggle('light');
        localStorage.setItem('wc-theme', html.classList.contains('light') ? 'light' : 'dark');
      });

      /* logout */
      function logout() { localStorage.removeItem('accessToken'); localStorage.removeItem('refreshToken'); window.location.href = 'login.html'; }
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('logoutBtnMobile').addEventListener('click', logout);

      /* Get vocab ID from query string */
      const params = new URLSearchParams(window.location.search);
      const vocabId = params.get('id');
      if (!vocabId) { window.location.href = 'dashboard.html'; return; }

      let vocabData = null;
      let wordsData = [];

      /* Load vocab */
      async function loadVocab() {
        try {
          const res = await fetch(`/api/vocab/${vocabId}`, {
            headers: { Authorization: 'Bearer ' + token }
          });
          if (res.status === 401) { logout(); return; }
          if (res.status === 404) { window.location.href = 'dashboard.html'; return; }
          vocabData = await res.json();
          wordsData = vocabData.words || [];
          renderHeader(vocabData);
          renderWords(wordsData);
        } catch {
          /* fallback sample data */
          vocabData = {
            id: vocabId, title: '비즈니스 필수 동사 100', description: '실제 비즈니스 상황에서 자주 쓰이는 동사 중심',
            tags: ['TOEIC', '비즈니스'], isPublic: true, wordCount: 3, learnedCount: 1,
            author: '나', updatedAt: '2026-06-06',
          };
          wordsData = [
            { id: 1, word: 'implement', ipa: '/ˈɪmplɪmənt/', meaning: '시행하다 · 실행하다', pos: '동사', example: 'The company will <em>implement</em> the new policy next quarter.', tip: '💡 impl(안에) + ment → 안으로 채워 넣다 → 실행하다', learned: true },
            { id: 2, word: 'significant', ipa: '/sɪɡˈnɪfɪkənt/', meaning: '중요한 · 상당한', pos: '형용사', example: 'There was a <em>significant</em> improvement in test scores.', tip: '💡 sign(신호) + ific → 신호를 보낼 만큼 중요한', learned: false },
            { id: 3, word: 'constitute', ipa: '/ˈkɒnstɪtjuːt/', meaning: '구성하다 · ~에 해당하다', pos: '동사', example: 'Women <em>constitute</em> 40% of the workforce.', tip: '💡 con(함께) + stitute(세우다) → 함께 세워 구성하다', learned: false },
          ];
          renderHeader(vocabData);
          renderWords(wordsData);
        }
      }

      function renderHeader(v) {
        const pct = v.wordCount ? Math.round((v.learnedCount || 0) / v.wordCount * 100) : 0;
        const tagHtml = (v.tags || []).map(t => `<span class="tag tag--${tagClass(t)}">${t}</span>`).join('');
        document.getElementById('vocabHeader').innerHTML = `
          <div class="container">
            <div class="vocab-header__inner">
              <div class="vocab-header__left">
                <div class="vocab-header__tags">${tagHtml}</div>
                <div class="vocab-header__title">${escHtml(v.title)}</div>
                <div class="vocab-header__meta">
                  <span>📚 ${v.wordCount || wordsData.length}단어</span>
                  <span>✅ ${v.learnedCount || 0}개 학습</span>
                  <span>${v.isPublic ? '🌐 공개' : '🔒 비공개'}</span>
                  <span>수정일 ${v.updatedAt || ''}</span>
                </div>
                <div class="vocab-progress">
                  <div class="vocab-progress__label"><span>학습 진도</span><span>${pct}%</span></div>
                  <div class="progress-bar"><div class="progress-bar__fill" style="width:${pct}%"></div></div>
                </div>
              </div>
              <div class="vocab-header__actions">
                <a href="test.html?vocabId=${v.id}" class="btn btn--primary">📝 테스트 시작</a>
                <button class="btn btn--ghost" id="togglePublicBtn">${v.isPublic ? '🔒 비공개로' : '🌐 공개로'}</button>
                <button class="btn btn--ghost" id="deleteBtn" style="border-color:#e55;color:#e55;">🗑️ 삭제</button>
              </div>
            </div>
          </div>`;
        document.getElementById('wordsTitle').textContent = `단어 목록 (${wordsData.length}개)`;

        document.getElementById('deleteBtn').addEventListener('click', () => {
          document.getElementById('deleteModal').classList.add('open');
        });
        document.getElementById('togglePublicBtn').addEventListener('click', togglePublic);
      }

      function renderWords(words) {
        const grid = document.getElementById('wordCardsGrid');
        if (words.length === 0) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-3);">단어가 없습니다.</div>';
          return;
        }
        grid.innerHTML = words.map(w => wordCard(w)).join('');
        grid.querySelectorAll('.bookmark-btn').forEach(btn => {
          btn.addEventListener('click', () => toggleLearned(btn));
        });
      }

      function wordCard(w) {
        return `
          <div class="wc reveal">
            <div class="wc__top">
              <div>
                <div class="wc__word">${escHtml(w.word)}</div>
                <div class="wc__ipa">${escHtml(w.ipa || '')}</div>
              </div>
              <div class="wc__actions">
                <button class="icon-btn bookmark-btn ${w.learned ? 'active' : ''}" data-id="${w.id}" title="${w.learned ? '학습 취소' : '학습 완료 표시'}">
                  ${w.learned ? '⭐' : '☆'}
                </button>
              </div>
            </div>
            <div class="wc__meaning">${escHtml(w.meaning)}</div>
            <div class="wc__example">"${w.example}"</div>
            ${w.tip ? `<div class="wc__tip">${escHtml(w.tip)}</div>` : ''}
            <div class="wc__tags">
              ${w.pos ? `<span class="tag tag--noun">${escHtml(w.pos)}</span>` : ''}
              ${w.learned ? '<span class="wc__learned-badge">✅ 학습 완료</span>' : ''}
            </div>
          </div>`;
      }

      async function toggleLearned(btn) {
        const wordId = btn.dataset.id;
        const isLearned = btn.classList.contains('active');
        try {
          await fetch(`/api/vocab/${vocabId}/words/${wordId}/learned`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify({ learned: !isLearned }),
          });
        } catch { /* optimistic UI */ }
        const word = wordsData.find(w => String(w.id) === String(wordId));
        if (word) word.learned = !isLearned;
        renderWords(filterWords());
        attachReveal();
      }

      async function togglePublic() {
        try {
          const res = await fetch(`/api/vocab/${vocabId}/visibility`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify({ isPublic: !vocabData.isPublic }),
          });
          if (res.ok) { vocabData.isPublic = !vocabData.isPublic; renderHeader(vocabData); }
        } catch { alert('변경에 실패했습니다.'); }
      }

      /* Delete */
      document.getElementById('deleteCancel').addEventListener('click', () => {
        document.getElementById('deleteModal').classList.remove('open');
      });
      document.getElementById('deleteConfirm').addEventListener('click', async () => {
        try {
          await fetch(`/api/vocab/${vocabId}`, {
            method: 'DELETE', headers: { Authorization: 'Bearer ' + token }
          });
        } catch { /* ignore */ }
        window.location.href = 'dashboard.html';
      });

      /* Search / filter */
      function filterWords() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const f = document.getElementById('filterSelect').value;
        return wordsData.filter(w => {
          const matchQ = !q || w.word.toLowerCase().includes(q) || (w.meaning || '').toLowerCase().includes(q);
          const matchF = f === 'all' || (f === 'learned' && w.learned) || (f === 'unlearned' && !w.learned);
          return matchQ && matchF;
        });
      }

      document.getElementById('searchInput').addEventListener('input', () => { renderWords(filterWords()); attachReveal(); });
      document.getElementById('filterSelect').addEventListener('change', () => { renderWords(filterWords()); attachReveal(); });

      function attachReveal() {
        setTimeout(() => {
          const els = document.querySelectorAll('.reveal:not(.visible)');
          els.forEach((el, i) => { el.style.transitionDelay = `${(i % 6) * 50}ms`; });
          const obs = new IntersectionObserver(
            entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
            { threshold: 0.05 }
          );
          els.forEach(el => obs.observe(el));
        }, 50);
      }

      function tagClass(t) {
        if (t === 'TOEIC') return 'toeic'; if (t === 'TOEFL') return 'toefl';
        if (t === '수능') return 'csat'; return 'noun';
      }
      function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      loadVocab();
    })();
  </script>
</body>
</html>
